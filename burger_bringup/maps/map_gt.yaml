# Ground-truth small_house occupancy map, copied from
# burger_worlds/worlds/small_house/map/{map.pgm,map.yaml}. Used by the AMCL localization
# path (map_server + amcl) as the default GT map; nav2 map_server format (image + yaml),
# NOT a slam_toolbox pose-graph. The map frame is aligned to the Gazebo world frame, so the
# robot's world spawn pose (small_house: -3.5, -4.5) is also its pose in this map.
image: map_gt.pgm
resolution: 0.05
origin: [-10.0, -10.0, 0.0]
occupied_thresh: 0.65
free_thresh: 0.196
negate: 0
