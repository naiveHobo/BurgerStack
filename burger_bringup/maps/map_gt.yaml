# Ground-truth office occupancy map, copied from
# burger_worlds/worlds/office/map/{map.png,map.yaml}. Used by the AMCL localization
# path (map_server + amcl); nav2 map_server format (image + yaml), NOT a slam_toolbox
# pose-graph. The map frame is aligned to the Gazebo world frame, so the robot's world
# spawn pose (office: -6, 8) is also its pose in this map.
image: map_gt.png
resolution: 0.05
origin: [-30.0, -30.0, 0.0]
occupied_thresh: 0.7
free_thresh: 0.1
negate: 0
