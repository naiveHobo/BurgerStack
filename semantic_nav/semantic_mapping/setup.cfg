[develop]
script_dir=$base/lib/semantic_mapping
[install]
install_scripts=$base/lib/semantic_mapping

# The ROS launch_testing pytest plugins ship a hookimpl with an outdated signature
# that is incompatible with this pytest; disable just those two so the pure-Python
# suite runs cleanly under both `pytest` and `colcon test`.
[tool:pytest]
addopts = -p no:launch_testing -p no:launch_ros
