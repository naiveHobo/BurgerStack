# Real-AI-backend overlay for the semantic_nav two-phase demo.
# Same node structure as params/semantic_nav.yaml, but every backend flipped from mock to
# the real implementation. Pass it in place of the default params file (no launch changes):
#
#   pixi run -e ai ros2 launch semantic_nav_bringup semantic_navigation.launch.py \
#       params_file:=$(ros2 pkg prefix semantic_nav_bringup)/share/semantic_nav_bringup/params/semantic_nav_real.yaml
#
# Requires the `ai` pixi env (pixi install -e ai) for torch/ultralytics/open_clip/ollama, plus
# a running ollama server with the models pulled:  ollama serve & ollama pull qwen2.5:7b moondream
# (YOLO-World + CLIP weights auto-download on first use). See the package README.

# --- Phase 1: perception (YOLO-World open-vocab detector) ----------------
perception_node:
  ros__parameters:
    use_sim_time: true
    detector: "yolo_world"           # was "mock" -> OpenVocabDetector (yolov8s-worldv2.pt)
    # Open-vocab class prompts (edit freely; no retraining). Tuned for the default
    # small_house (AWS residential) world's furniture, with office-compatible terms kept.
    vocabulary:
      - "chair"
      - "table"
      - "coffee table"
      - "desk"
      - "sofa"
      - "bed"
      - "nightstand"
      - "wardrobe"
      - "cabinet"
      - "bookshelf"
      - "television"
      - "tv stand"
      - "refrigerator"
      - "oven"
      - "lamp"
      - "chandelier"
      - "potted plant"
      - "vase"
      - "curtain"
      - "rug"
      - "picture frame"
      - "window"
      - "door"
      - "trash can"
      - "ball"
      - "person"
      - "monitor"
      - "laptop"
    target_frame: "map"
    process_period_sec: 0.5
    confidence_threshold: 0.3
    depth_max: 8.0
    publish_markers: true

# --- Phase 1: semantic map builder (ollama VLM describe + CLIP embed) -----
mapping_node:
  ros__parameters:
    use_sim_time: true
    map_frame: "map"
    describer: "ollama"              # was "mock" -> OllamaDescriber
    embedder: "clip"                # was "mock" -> ClipEmbedder
    # NOTE: with embedder: clip the embedding_dim below is IGNORED — CLIP fixes the dim
    # (ViT-B-32 -> 512). clip_model MUST match map_server_node so the spaces line up.
    embedding_dim: 64
    clip_model: "ViT-B-32"
    vlm_model: "moondream"
    ollama_host: "http://localhost:11434"
    region_eps: 1.5
    assoc_radius: 0.5
    map_output_path: "~/.semantic_nav/semantic_map.json"
    publish_markers: true
    publish_period_sec: 1.0

# --- Phase 1: handoff orchestrator (unchanged; no AI) --------------------
map_finalizer:
  ros__parameters:
    use_sim_time: true
    semantic_map_path: "~/.semantic_nav/semantic_map.json"
    occupancy_map_path: "~/.semantic_nav/occupancy_map"
    build_service: "/mapping_node/build_semantic_map"
    save_map_service: "/map_saver/save_map"
    map_topic: "/map"
    completion_topic: "/exploration_complete"
    auto_finalize: false
    # Real-backend enrich over all retained crops takes minutes (ollama VLM
    # describe dominates; CLIP weights also download on first use). A ~200-crop
    # build measured ~117 s, so the old 30 s default reported a false
    # "semantic FAILED" while the build actually finished. Wait for the result.
    service_timeout_sec: 300.0

# --- Phase 2: semantic map server (CLIP text queries) --------------------
map_server_node:
  ros__parameters:
    use_sim_time: true
    map_frame: "map"
    embedder: "clip"                # was "mock"; clip_model MUST match mapping_node above
    embedding_dim: 64               # ignored for clip (see note above)
    clip_model: "ViT-B-32"
    map_path: "~/.semantic_nav/semantic_map.json"
    publish_markers: true
    default_top_k: 10

# --- Phase 2: agentic reasoning (ollama tool-calling agent) --------------
execute_task_node:
  ros__parameters:
    use_sim_time: true
    backend: "ollama"               # was "mock" -> OllamaAgentBackend
    ollama_model: "qwen2.5:7b"
    ollama_host: "http://localhost:11434"
    query_service: "/map_server_node/query_semantic_map"
    nav_action: "/navigate_to_pose"
    map_frame: "map"
    robot_base_frame: "base_link"
    nav_timeout_sec: 120.0
    max_steps: 8
